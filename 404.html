<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Replicater</title>
<script>
  (function () {
    var path = location.pathname.replace(/\/+$/, '') || '/';
    var target = {
      '/index.html': '/',
      '/lab.html': '/',
      '/research.html': '/research',
      '/research/index.html': '/research'
    }[path];
    if (target) {
      location.replace(target + location.search + location.hash);
      return;
    }
  })();
</script>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #f4ecde;
    color: #2a2f3a;
    font-family: Georgia, serif;
  }
  a { color: #3a4a5c; }
</style>
</head>
<body>
  <p>Page not found. <a href="/">Home</a> · <a href="/research">Research</a></p>
</body>
</html>
