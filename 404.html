<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Replicater</title>
<script>
  (function () {
    var path = location.pathname;
    if (/\.html$/.test(path)) {
      var clean = path.replace(/\.html$/, '');
      if (clean === '/index') clean = '/';
      if (clean === '/lab') clean = '/';
      location.replace(clean + location.search + location.hash);
      return;
    }
    if (path === '/research/index.html') {
      location.replace('/research' + location.search + location.hash);
    }
  })();
</script>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #f4ecde;
    color: #2a2f3a;
    font-family: Georgia, serif;
  }
  a { color: #3a4a5c; }
</style>
</head>
<body>
  <p>Page not found. <a href="/">Home</a> · <a href="/research">Research</a> · <a href="/manifesto">Manifesto</a></p>
</body>
</html>
