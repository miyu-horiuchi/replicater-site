<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Replicater</title>
<script>
  (function () {
    var path = location.pathname.replace(/\/$/, '') || '/';
    if (path === '/research' || path === '/research.html') {
      location.replace('/research/' + location.search + location.hash);
      return;
    }
    if (path === '/manifesto' || path === '/manifesto.html') {
      location.replace('/manifesto/' + location.search + location.hash);
      return;
    }
    if (/\/index\.html$/.test(location.pathname)) {
      location.replace((location.pathname.replace(/\/index\.html$/, '') || '/') + location.search + location.hash);
      return;
    }
    if (/\.html$/.test(location.pathname)) {
      var clean = location.pathname.replace(/\.html$/, '');
      if (clean === '/index' || clean === '/lab') clean = '/';
      location.replace(clean + location.search + location.hash);
    }
  })();
</script>
<script src="/clean-urls.js?v=4"></script>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #f4ecde;
    color: #2a2f3a;
    font-family: Georgia, serif;
  }
  a { color: #3a4a5c; }
</style>
</head>
<body>
  <p>Page not found. <a href="/">Home</a> · <a href="/research/">Research</a> · <a href="/manifesto/">Manifesto</a></p>
</body>
</html>
